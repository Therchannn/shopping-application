spring.application.name=shoppingApp

spring.datasource.url=jdbc:mysql://localhost:3306/app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:Shopping.sql

# Custom server port
server.port=8080

# Turn off the banner
spring.main.banner-mode=off

server.servlet.context-path=/outerity

# Reduce logging level
logging.level.root=warn
