spring.application.name=shoppingApp

# Database config - use internal Railway MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://mysql.railway.internal:3306/railway?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Completely disable SQL script initialization to avoid startup dependency on database schema
spring.sql.init.mode=never
spring.sql.init.data-locations=

# Port: Railway sets this via PORT env var
server.port=${PORT:8080}
spring.main.banner-mode=off
server.servlet.context-path=/outerity
logging.level.root=warn

# Connection pool - make completely lazy, don't validate on startup
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Allow 120 seconds for initialization (wait-for-db.sh provides 90s + 15s = 105s before app starts)
spring.datasource.hikari.initialization-fail-timeout=120000
# Disable connection validation on borrow (only validate when actually using)
spring.datasource.hikari.test-on-borrow=false
# Don't validate idle connections
spring.datasource.hikari.test-while-idle=false
# Give more time before marking connection as leaked
spring.datasource.hikari.leak-detection-threshold=60000
