spring.application.name=shoppingApp

# Database config - su dung bien moi truong neu co (cho cloud), fallback ve local
# On Railway, use internal hostname (mysql.railway.internal) for service-to-service communication
spring.datasource.url=${DATABASE_URL:jdbc:mysql://mysql.railway.internal:3306/railway?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Disable automatic SQL script initialization - schema already exists
spring.sql.init.mode=never
spring.sql.init.schema-locations=

# Port: Railway tu dong set bien PORT
server.port=${PORT:8080}
spring.main.banner-mode=off
server.servlet.context-path=/outerity
logging.level.root=warn

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
