<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
    <link rel="stylesheet" th:href="@{/css/layoutInfo.css}">
    <link rel="stylesheet" th:href="@{/themify-icons/themify-icons.css}">
    <link rel="stylesheet" th:href="@{/fontawesome-free-7.1.0-web/css/all.min.css}">
    <link rel="icon" th:href="@{/images/favicon.png}">
    <title>Outerity</title>
</head>
<body>

    <div class="grid__column-2 main__sidebar" th:fragment="sidebar">

        <div class="main__heading">
            <p class="heading__title">Xin chào bạn !</p>
        </div>

        <div class="main__nav">
            <ul>
                <li class="nav__item">
                    <a th:href="@{/info}">
                        <i class="nav__item-icon ti-id-badge"></i>
                        Thông tin của tôi
                    </a>
                </li>
                <li class="nav__item">
                    <a th:href="@{/order}">
                        <i class="nav__item-icon ti-package"></i>
                        Đơn hàng của tôi
                    </a>
                </li>
                <li class="nav__item">
                    <button class="btn logout__btn">
                        <i class="nav__item-icon fa-solid fa-arrow-right-from-bracket"></i>
                        Đăng xuất
                    </button>
                </li>
            </ul>
        </div>

        <div class="logout">
            <div class="logout__overlay"></div>
    
            <div class="logout__body">
    
                <form th:action="@{/logout}" method="post" class="logout_form">
                    <div class="logout__container">
                        <i class="logout__icon fa-solid fa-square-xmark"></i>
                        <h2 class="logout__heading">Bạn muốn đăng xuất khỏi Outerity</h2>
                        <button type="submit" class="btn__confirm">Xác nhận</button>
                        <button type="button" class="btn__back">Quay lại</button>
                    </div>
                </form>
    
            </div>
        </div>
        
    </div>


    <script th:src="@{/js/logoutHandle.js}" th:fragment="logoutHandle"></script>
    <script th:src="@{/js/openCart.js}"></script>

</body>
</html>
