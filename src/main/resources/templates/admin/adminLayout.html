<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, scripts)">
<head>
  <meta charset="UTF-8" />
  <title th:text="${title} + ' | Outerity Admin'">Admin | Outerity</title>
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  <link rel="stylesheet" th:href="@{/css/admin.css}" />
  <link rel="stylesheet" th:href="@{/css/notification.css}" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-section">
      <a th:href="@{/admin/dashboard}" class="logo-link">
        <img th:src="@{/images/favicon.png}" alt="Lock" class="logo-icon">
      </a>

    </div>
    <div class="menu-group">
      <div class="menu-title">MARKETING</div>
      <a th:href="@{/admin/dashboard}"
         class="menu-item"
         th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
        <i class="bi bi-activity"></i> Dashboard
      </a>
      <a th:href="@{/admin/products}"
         class="menu-item"
         th:classappend="${currentPage == 'products'} ? 'active' : ''">
        <i class="bi bi-bag"></i> Sản phẩm
      </a>
      <a th:href="@{/admin/orders}"
         class="menu-item"
         th:classappend="${currentPage == 'orders'} ? 'active' : ''">
        <i class="bi bi-receipt"></i> Đơn hàng
      </a>
      <a th:href="@{/admin/customers}"
         class="menu-item"
         th:classappend="${currentPage == 'customers'} ? 'active' : ''">
        <i class="bi bi-people"></i> Khách hàng
      </a>
      <a th:href="@{/admin/statistics}"
         class="menu-item"
         th:classappend="${currentPage == 'statistics'} ? 'active' : ''">
        <i class="bi bi-bar-chart"></i> Thống kê
      </a>
    </div>

    <div class="menu-group">
      <div class="menu-title">SYSTEM</div>
      <a th:href="@{/admin/settings}"
         class="menu-item"
         th:classappend="${currentPage == 'settings'} ? 'active' : ''">
        <i class="bi bi-gear"></i> Cài đặt
      </a>
    </div>

    <div class="user-section">
      <div class="user">
        <i class="bi bi-person-circle"></i>
        <span th:text="${loggedInUsername != null ? loggedInUsername : 'Zair0u'}">Zair0u</span>
      </div>
      <a th:href="@{/admin/logout}" class="logout">
        <i class="bi bi-box-arrow-right"></i> Đăng xuất
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <div class="top-logo">
      <img th:src="@{/images/logo.svg}" alt="Outerity Logo">
    </div>

    <!-- Content được inject vào đây -->
    <div th:replace="${content}"></div>
  </main>
</div>

<!-- Scripts được inject vào đây -->
<script th:src="@{/js/notification.js}"></script>
<script th:src="@{/js/layout.js}"></script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
