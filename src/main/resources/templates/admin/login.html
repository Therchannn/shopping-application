<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <style>
    body{font-family: Arial, sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f4f4f4}
    .card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);width:320px}
    .error{color:#b00020;margin-bottom:12px}
    input{width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:4px}
    button{width:100%;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer}
  </style>
</head>
<body>
<div class="card">
  <h3>Admin Login</h3>
  <div th:if="${loginError}" class="error" th:text="${loginError}"></div>
  <form th:action="@{/admin/login}" method="post" id="loginForm">
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
