<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | Outerity Admin</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-section">
      <img th:src="@{/images/favicon.png}" alt="Lock" class="logo-icon">
    </div>
    <div class="menu-group">
      <div class="menu-title">MARKETING</div>
      <a th:href="@{/admin/dashboard}" class="menu-item active"><i class="bi bi-activity"></i> Dashboard</a>
      <a th:href="@{/admin/products}" class="menu-item"><i class="bi bi-bag"></i> Sản phẩm</a>
      <a th:href="@{/admin/orders}" class="menu-item"><i class="bi bi-receipt"></i> Đơn hàng</a>
      <a th:href="@{/admin/customers}" class="menu-item"><i class="bi bi-people"></i> Khách hàng</a>
      <a th:href="@{/admin/statistics}" class="menu-item"><i class="bi bi-bar-chart"></i> Thống kê</a>
    </div>

    <div class="menu-group">
      <div class="menu-title">SYSTEM</div>
      <a th:href="@{/admin/settings}" class="menu-item"><i class="bi bi-gear"></i> Cài đặt</a>
    </div>

    <div class="user-section">
      <div class="user">
        <i class="bi bi-person-circle"></i>
        <span>Zair0u</span>
      </div>
      <a th:href="@{/admin/logout}" class="logout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <div class="top-logo">
      <img th:src="@{/images/logo.svg}" alt="Outerity Logo">
    </div>

    <h2>Dashboard</h2>

    <!-- KPI CARDS -->
    <section class="kpi-grid">
      <div class="kpi-card yellow">
        <div class="kpi-header">
          <i class="bi bi-people-fill"></i>
          <span>Tổng số khách hàng</span>
        </div>
        <div class="kpi-value" th:text="${userCount}">567,899</div>
        <i class="bi bi-graph-up-arrow growth-icon"></i>
      </div>

      <div class="kpi-card purple">
        <div class="kpi-header">
          <i class="bi bi-coin"></i>
          <span>Tổng doanh thu</span>
        </div>
        <div class="kpi-value" th:text="${revenue}">$3,465 M</div>
        <i class="bi bi-graph-up-arrow growth-icon"></i>
      </div>

      <div class="kpi-card green">
        <div class="kpi-header">
          <i class="bi bi-cart-check-fill"></i>
          <span>Tổng đơn hàng</span>
        </div>
        <div class="kpi-value" th:text="${orderCount}">1,136 M</div>
        <i class="bi bi-graph-up-arrow growth-icon"></i>
      </div>

      <div class="kpi-card blue">
        <div class="kpi-header">
          <i class="bi bi-box-fill"></i>
          <span>Tổng số sản phẩm</span>
        </div>
        <div class="kpi-value" th:text="${productCount}">1,789</div>
        <i class="bi bi-graph-up-arrow growth-icon"></i>
      </div>
    </section>

    <!-- CHARTS -->
    <section class="charts">
      <div class="chart-card">
        <h3>Doanh thu theo ngày</h3>
        <canvas id="revenueChart"></canvas>
      </div>

      <div class="chart-card">
        <h3>Bán theo từng sản phẩm</h3>
        <canvas id="categoryChart"></canvas>
      </div>
    </section>
  </main>
</div>

<script th:inline="javascript">
  window.DASHBOARD_DATA = {
    monthlyRevenue: /*[[${monthlyRevenue}]]*/ [],
    categoryLabels: /*[[${categoryLabels}]]*/ [],
    categoryData: /*[[${categoryData}]]*/ []
  };
</script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
