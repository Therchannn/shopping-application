<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">Shop Admin</div>
    <nav class="nav">
      <a th:href="@{/admin/dashboard}" class="active">Dashboard</a>
      <a th:href="@{/admin/products}">Products</a>
      <a th:href="@{/admin/orders}">Orders</a>
      <a th:href="@{/admin/customers}">Customers</a>
      <a th:href="@{/admin/statistics}">Statistics</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <header>
      <h2>Dashboard</h2>
      <div class="right">
        <a class="btn" th:href="@{/admin/logout}">Logout</a>
      </div>
    </header>

    <!-- KPI CARDS -->
    <section class="grid">
      <div class="card kpi-card blue">
        <div class="muted">Products</div>
        <div class="kpi" th:text="${productCount}">0</div>
      </div>
      <div class="card kpi-card green">
        <div class="muted">Orders</div>
        <div class="kpi" th:text="${orderCount}">0</div>
      </div>
      <div class="card kpi-card yellow">
        <div class="muted">Customers</div>
        <div class="kpi" th:text="${userCount}">0</div>
      </div>
      <div class="card kpi-card purple">
        <div class="muted">Revenue (Month)</div>
        <div class="kpi" th:text="${revenue}">$0</div>
      </div>
    </section>

    <!-- CHARTS -->
    <section class="charts">
      <div class="card chart-card">
        <h3>Monthly Revenue</h3>
        <canvas id="revenueChart"></canvas>
      </div>
      <div class="card chart-card">
        <h3>Sales by Category</h3>
        <canvas id="categoryChart"></canvas>
      </div>
    </section>
  </main>
</div>

<!-- SCRIPT -->
<script th:inline="javascript">
  /*<![CDATA[*/
  const revenueData = /*[[${monthlyRevenue}]]*/ [500,700,800,650,900,1200,1500];
  const categoryLabels = /*[[${categoryLabels}]]*/ ['Shirts','Pants'];
  const categoryData = /*[[${categoryData}]]*/ [40,25];
  /*]]>*/

  const ctx1 = document.getElementById('revenueChart');
  new Chart(ctx1, {
    type: 'line',
    data: {
      labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul'],
      datasets: [{
        label: 'Revenue ($)',
        data: revenueData,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,0.1)',
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  const ctx2 = document.getElementById('categoryChart');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: categoryLabels,
      datasets: [{
        data: categoryData,
        backgroundColor: ['#60a5fa','#34d399','#facc15','#a78bfa']
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom' }
      }
    }
  });
</script>
</body>
</html>
