<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Admin Home</title>
  <style>
    body{font-family: Arial, sans-serif;padding:24px;background:#fafafa}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border:1px solid #ddd;text-align:left}
    th{background:#f0f0f0}
    a.button{display:inline-block;padding:8px 12px;background:#007bff;color:#fff;text-decoration:none;border-radius:4px}
    a.button.secondary{background:#6c757d}
  </style>
</head>
<body>
<header>
  <h2>Admin - Products</h2>
  <div>
    <a class="button secondary" th:href="@{/admin/home}">Refresh</a>
    <a class="button" th:href="@{/admin/logout}">Logout</a>
  </div>
</header>
<table>
  <thead>
  <tr><th>ID</th><th>Name</th><th>Price</th></tr>
  </thead>
  <tbody>
  <tr th:each="p : ${products}">
    <td th:text="${p.id}">1</td>
    <td th:text="${p.name}">Sample</td>
    <td th:text="${#lists.isEmpty(p.variants) ? 'N/A' : p.variants.get(0).price}">0.00</td>
  </tr>
  </tbody>
</table>
</body>
</html>
