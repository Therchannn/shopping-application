  <!DOCTYPE html>
  <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="stylesheet" th:href="@{/css/base.css}" />
      <link rel="stylesheet" th:href="@{/css/cart.css}" />
      <link rel="stylesheet" th:href="@{/css/layoutInfo.css}" />
      <link rel="stylesheet" th:href="@{/css/layoutOrder.css}" />
      <link rel="stylesheet" th:href="@{/css/layout.css}" />
      <link rel="stylesheet" th:href="@{/themify-icons/themify-icons.css}" />
      <link
        rel="stylesheet"
        th:href="@{/fontawesome-free-7.1.0-web/css/all.min.css}"
      />
      <link rel="icon" th:href="@{/images/favicon.png}" />
      <title>Đơn hàng của bạn</title>
    </head>

    <body>
      <div th:replace="layout ::header"></div>

      <h1 class="order__heading">Đơn hàng của bạn</h1>

      <div class="order__wrap">
        <div th:replace="layoutInfo ::sidebar"></div>

        <div class="order__list">
          <!-- Tabs -->
          <div class="order__items">
            <span
              class="order__status"
              th:classappend="${param.type == null or param.type[0] == 'all'} ? 'active' : ''"
              th:onclick="|window.location.href='@{/layoutOrder(type=all)}'|"
              onclick="handleStatusClick(this, 'all')"
              >Tất cả đơn</span
            >

            <span
              class="order__status"
              th:classappend="${param.type != null and param.type[0] == 'new'} ? 'active' : ''"
              th:onclick="|window.location.href='@{/layoutOrder(type=new)}'|"
              onclick="handleStatusClick(this, 'new')"
              >Đơn mới</span
            >

            <span
              class="order__status"
              th:classappend="${param.type != null and param.type[0] == 'confirmed'} ? 'active' : ''"
              th:onclick="|window.location.href='@{/layoutOrder(type=confirmed)}'|"
              onclick="handleStatusClick(this, 'confirmed')"
              >Đã xác nhận</span
            >

            <span
              class="order__status"
              th:classappend="${param.type != null and param.type[0] == 'cancelled'} ? 'active' : ''"
              th:onclick="|window.location.href='@{/layoutOrder(type=cancelled)}'|"
              onclick="handleStatusClick(this, 'cancelled')"
              >Đã hủy</span
            >
          </div>

          <!-- Vùng nội dung động -->
          <div
            th:if="${param.type == null or param.type[0] == 'all'}"
            th:include="fragments/order-all :: content"
          ></div>

          <div
            th:if="${param.type != null and param.type[0] == 'new'}"
            th:include="fragments/order-new :: content"
          ></div>

          <div
            th:if="${param.type != null and param.type[0] == 'confirmed'}"
            th:include="fragments/order-confirmed :: content"
          ></div>

          <div
            th:if="${param.type != null and param.type[0] == 'cancelled'}"
            th:include="fragments/order-cancelled :: content"
          ></div>
        </div>
      </div>

      <div th:replace="layout ::footer"></div>

      <span class="footer">Copyright © 2025 Outerity. Powered by Haravan</span>

      <script th:src="@{/js/layoutOrder.js}"></script>
      <script th:src="@{/js/openCart.js}"></script>
    </body>
  </html>
