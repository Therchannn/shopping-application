  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Cart</title>
    <!-- CSS  -->
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/cart.css}" />
    <!-- ICON FONTAWESOME -->
    <link rel="stylesheet" th:href="@{/fontawesome/css/all.min.css}" />
    <!-- ICON IONICS -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </head>
  <body>
    <div th:fragment="cartPanel">

    <div class="cart is-hidden">
      <!-- Nếu trống -->
      <div class="cart_list" th:if="${#lists.isEmpty(cartItems)}">
        <h2 class="cart-heading">Giỏ hàng của bạn</h2>
        <div class="cart_empty">
          <i class="cart-icon fa-solid fa-inbox"></i>
          <span class="cart-desc">Giỏ hàng của bạn đang trống</span>
        </div>
        <a th:href="@{/home}" class="btn cart-btn">Tiếp tục mua sắm</a>
      </div>

      <!-- Giỏ hàng có sản phẩm  -->
      <div class="cart_list" th:unless="${#lists.isEmpty(cartItems)}">
        <h2 class="cart-heading">Giỏ hàng của bạn</h2>
        <div class="cart_item">
          <div th:each="item : ${cartItems}" class="cart_solid">
            <div class="cart_image">
              <img th:src="${item.imageUrl}" alt="Sản phẩm" />
            </div>

            <div class="cart_content">
              <h3 class="cart_title" th:text="${item.name}">Tên sản phẩm</h3>
              <span
                class="cart_price"
                th:text="${#numbers.formatInteger(item.price, 3, 'POINT')} + ' VND'"
                th:attr="data-base-price=${item.price}"
              >
              </span>

              <div class="cart_wrapper">
                <span class="cart_info">Size:</span>
                <span th:text="${item.size}">M</span>
              </div>

              <div class="cart_wrapper">
                <span class="cart_info">Số lượng:</span>
                <div class="cart_amount">
                  <button class="btn-justify" onclick="handlePlus(this)">
                    <i class="fa-solid fa-plus"></i>
                  </button>
                  <input
                    type="text"
                    name="amount"
                    class="amount"
                    th:value="${item.quantity}"
                  />
                  <button class="btn-justify" onclick="handleMinus(this)">
                    <i class="fa-solid fa-minus"></i>
                  </button>
                </div>
              </div>

              <div class="cart_wrapper">
                <span class="cart_info">Màu:</span>
                <span th:text="${item.color}"></span>
              </div>

              <button class="btn cart_del">
                <i class="fa-solid fa-trash"></i> Xóa
              </button>
            </div>
          </div>
        </div>
        <div class="cart_bottom">
          <!-- <div class="cart_wrapper">
            <span class="cart_info">TỔNG TIỀN:</span>
            <span
              class="cart_total"
              th:text="${item.total}"
            ></span>

                    <p>Xin chào, <span th:text="${session.username}">User</span>!</p>

          </div> -->

          <button class="btn cart-btn">THANH TOÁN</button>
        </div>
      </div>
          </div>
